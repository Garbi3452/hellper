<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявка на роль Helper</title>

  <style>
    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(-45deg, rgb(88, 101, 242), rgb(20, 20, 20), rgb(140, 82, 255), rgb(10, 10, 10));
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 25px;
      color: #ccc;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.12);
      color: white;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, rgb(88, 101, 242), rgb(140, 82, 255));
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .button:hover {
      transform: translateY(-2px);
    }

    #status {
      text-align: center;
      margin-top: 10px;
      font-weight: bold;
    }

    .requirements {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.08);
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Helper Application</h1>
    <p class="subtitle">Заполните форму</p>

    <form>

      <div class="form-group">
        <label>Ник</label>
        <input type="text" placeholder="Введите ваш ник">
      </div>

      <div class="form-group">
        <label>Возраст</label>
        <input type="number" placeholder="Введите возраст">
      </div>

      <div class="form-group">
        <label>Discord</label>
        <input type="text" placeholder="example_user">
      </div>

      <div class="form-group">
        <label>Онлайн</label>
        <input type="text" placeholder="5-6 часов">
      </div>

      <div class="form-group">
        <label>Опыт</label>
        <textarea></textarea>
      </div>

      <div class="form-group">
        <label>Почему Helper?</label>
        <textarea></textarea>
      </div>

      <div class="form-group">
        <label>Польза серверу</label>
        <textarea></textarea>
      </div>

      <div class="form-group">
        <label>Часовой пояс</label>
        <input type="text" placeholder="GMT+3">
      </div>

      <div class="checkbox">
        <input type="checkbox" id="rules">
        <label for="rules">Я согласен с правилами</label>
      </div>

      <button class="button" type="submit">Отправить</button>

      <p id="status"></p>
    </form>

    <div class="requirements">
      <h3>Требования</h3>
      <ul>
        <li>Адекватность</li>
        <li>Активность</li>
        <li>14+ возраст</li>
      </ul>
    </div>
  </div>

  <script>
    const form = document.querySelector('form');
    const status = document.querySelector('#status');

    function show(msg, color) {
      status.textContent = msg;
      status.style.color = color;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      const inputs = document.querySelectorAll('input[type="text"], input[type="number"], textarea');

      const nickname = inputs[0].value.trim();
      const age = inputs[1].value.trim();
      const discord = inputs[2].value.trim();
      const online = inputs[3].value.trim();
      const experience = inputs[4].value.trim();
      const reason = inputs[5].value.trim();
      const useful = inputs[6].value.trim();
      const timezone = inputs[7].value.trim();
      const rules = document.querySelector('#rules').checked;

      if (!nickname || !age || !discord || !online || !experience || !reason || !useful || !timezone) {
        show('❌ Заполните все поля!', 'red');
        return;
      }

      if (!rules) {
        show('❌ Нужно согласиться с правилами!', 'red');
        return;
      }

      show('⏳ Отправка...', 'yellow');

      fetch("https://discord.com/api/webhooks/1508919284716539974/izugMKaiPCjAU4WzA06v9q9bV3uQwa8yMFB6QozE9ZyPgBrFVN7ClkWr4y7A6FTKqQ0P", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          embeds: [{
            title: "📨 Новая заявка",
            color: 5793266,
            fields: [
              { name: "Ник", value: nickname },
              { name: "Возраст", value: age, inline: true },
              { name: "Discord", value: discord, inline: true },
              { name: "Онлайн", value: online },
              { name: "Опыт", value: experience },
              { name: "Причина", value: reason },
              { name: "Польза", value: useful },
              { name: "Часовой пояс", value: timezone }
            ]
          }]
        })
      })
      .then(() => {
        show('✅ Отправлено!', 'lightgreen');
        form.reset();
      })
      .catch(() => {
        show('❌ Ошибка отправки', 'red');
      });
    });
  </script>
</body>
</html>
