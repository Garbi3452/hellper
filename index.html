<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Заявка на роль Helper</title>
  <style>
    @keyframes gradientMove {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(-45deg, rgb(88, 101, 242), rgb(20, 20, 20), rgb(140, 82, 255), rgb(10, 10, 10));
      background-size: 400% 400%;
      animation: gradientMove 12s ease infinite;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 34px;
      color: #ffffff;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 30px;
      color: #d7d7d7;
      font-size: 15px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.3s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.01);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    input::placeholder,
    textarea::placeholder {
      color: #d0d0d0;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }

    .checkbox input {
      width: auto;
    }

    .button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, rgb(88, 101, 242), rgb(140, 82, 255));
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .button:hover {
      background: linear-gradient(135deg, rgb(120, 120, 255), rgb(170, 100, 255));
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(120, 100, 255, 0.5);
    }

    .requirements {
      margin-top: 30px;
      background: rgba(255, 255, 255, 0.08);
      padding: 20px;
      border-radius: 15px;
    }

    .requirements h2 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    .requirements ul {
      padding-left: 20px;
      color: #e5e5e5;
    }

    .requirements li {
      margin-bottom: 8px;
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Helper Application</h1>
    <p class="subtitle">Заполните форму для подачи заявки на роль хелпера</p>

    <form>
      <div class="form-group">
        <label>Ваш никнейм</label>
        <input type="text" placeholder="Введите ваш ник" />
      </div>

      <div class="form-group">
        <label>Возраст</label>
        <input type="number" placeholder="Введите возраст" />
      </div>

      <div class="form-group">
        <label>Discord Tag</label>
        <input type="text" placeholder="example_user" />
      </div>

      <div class="form-group">
        <label>Сколько времени вы проводите на сервере?</label>
        <input type="text" placeholder="Например: 5-6 часов" />
      </div>

      <div class="form-group">
        <label>Есть ли опыт модерации?</label>
        <textarea placeholder="Расскажите о вашем опыте"></textarea>
      </div>

      <div class="form-group">
        <label>Почему хотите стать Helper?</label>
        <textarea placeholder="Ваш ответ"></textarea>
      </div>

      <div class="form-group">
        <label>Чем будете полезны серверу?</label>
        <textarea placeholder="Ваш ответ"></textarea>
      </div>

      <div class="form-group">
        <label>Часовой пояс</label>
        <input type="text" placeholder="Например: GMT+3" />
      </div>

      <div class="checkbox">
        <input type="checkbox" id="rules" />
        <label for="rules">Я согласен соблюдать правила сервера</label>
      </div>

      <button class="button" type="submit">Отправить заявку</button>
    </form>

    <div class="requirements">
      <h2>Требования</h2>
      <ul>
        <li>Адекватность</li>
        <li>Активность</li>
        <li>Знание правил сервера</li>
        <li>Уважение к участникам</li>
        <li>Возраст 14+</li>
      </ul>
    </div>
  </div>
  <script>
    const form = document.querySelector('form');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const WEBHOOK_URL = 'https://discord.com/api/webhooks/1508919284716539974/izugMKaiPCjAU4WzA06v9q9bV3uQwa8yMFB6QozE9ZyPgBrFVN7ClkWr4y7A6FTKqQ0P';

      const data = {
        nickname: document.querySelector('input[placeholder="Введите ваш ник"]').value,
        age: document.querySelector('input[placeholder="Введите возраст"]').value,
        discord: document.querySelector('input[placeholder="example_user"]').value,
        online: document.querySelector('input[placeholder="Например: 5-6 часов"]').value,
        experience: document.querySelectorAll('textarea')[0].value,
        reason: document.querySelectorAll('textarea')[1].value,
        useful: document.querySelectorAll('textarea')[2].value,
        timezone: document.querySelector('input[placeholder="Например: GMT+3"]').value,
        date: new Date().toLocaleString()
      };

      fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          embeds: [
            {
              title: '📨 Новая заявка на Helper',
              color: 5793266,
              fields: [
                {
                  name: '👤 Ник',
                  value: data.nickname || 'Не указано'
                },
                {
                  name: '🎂 Возраст',
                  value: data.age || 'Не указано',
                  inline: true
                },
                {
                  name: '💬 Discord',
                  value: data.discord || 'Не указано',
                  inline: true
                },
                {
                  name: '⏰ Онлайн',
                  value: data.online || 'Не указано'
                },
                {
                  name: '🛡 Опыт',
                  value: data.experience || 'Нет'
                },
                {
                  name: '🔥 Почему хочет стать Helper',
                  value: data.reason || 'Не указано'
                },
                {
                  name: '✅ Польза серверу',
                  value: data.useful || 'Не указано'
                },
                {
                  name: '🌍 Часовой пояс',
                  value: data.timezone || 'Не указано'
                }
              ],
              footer: {
                text: 'Helper Application System'
              },
              timestamp: new Date()
            }
          ]
        })
      })
      .then(() => {
        alert('Заявка успешно отправлена!');
        form.reset();
      })
      .catch(() => {
        alert('Ошибка отправки заявки');
      });
    });
  </script>
</body>
</html>
