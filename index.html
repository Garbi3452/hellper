<script>
  const form = document.querySelector('form');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const nickname = document.querySelector('input[placeholder="Введите ваш ник"]').value.trim();
    const age = document.querySelector('input[placeholder="Введите возраст"]').value.trim();
    const discord = document.querySelector('input[placeholder="example_user"]').value.trim();
    const online = document.querySelector('input[placeholder="Например: 5-6 часов"]').value.trim();
    const experience = document.querySelectorAll('textarea')[0].value.trim();
    const reason = document.querySelectorAll('textarea')[1].value.trim();
    const useful = document.querySelectorAll('textarea')[2].value.trim();
    const timezone = document.querySelector('input[placeholder="Например: GMT+3"]').value.trim();
    const rules = document.querySelector('#rules').checked;

    // 🔴 Проверка пустых полей
    if (
      !nickname ||
      !age ||
      !discord ||
      !online ||
      !experience ||
      !reason ||
      !useful ||
      !timezone
    ) {
      alert('❌ Пожалуйста, заполните все поля!');
      return;
    }

    // 🔴 Проверка чекбокса
    if (!rules) {
      alert('❌ Вы должны согласиться с правилами!');
      return;
    }

    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1508919284716539974/izugMKaiPCjAU4WzA06v9q9bV3uQwa8yMFB6QozE9ZyPgBrFVN7ClkWr4y7A6FTKqQ0P';

    const data = {
      nickname,
      age,
      discord,
      online,
      experience,
      reason,
      useful,
      timezone,
      date: new Date().toLocaleString()
    };

    fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        embeds: [
          {
            title: '📨 Новая заявка на Helper',
            color: 5793266,
            fields: [
              { name: '👤 Ник', value: data.nickname },
              { name: '🎂 Возраст', value: data.age, inline: true },
              { name: '💬 Discord', value: data.discord, inline: true },
              { name: '⏰ Онлайн', value: data.online },
              { name: '🛡 Опыт', value: data.experience },
              { name: '🔥 Почему хочет стать Helper', value: data.reason },
              { name: '✅ Польза серверу', value: data.useful },
              { name: '🌍 Часовой пояс', value: data.timezone }
            ],
            footer: {
              text: 'Helper Application System'
            },
            timestamp: new Date()
          }
        ]
      })
    })
    .then(() => {
      alert('✅ Заявка успешно отправлена!');
      form.reset();
    })
    .catch(() => {
      alert('❌ Ошибка отправки заявки');
    });
  });
</script>
